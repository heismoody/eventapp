name: eventapp
description: EventSys mobile scanner app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  mobile_scanner: ^6.0.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  connectivity_plus: ^6.1.1
  sqflite: ^2.3.3
  path: ^1.9.0
  cryptography: ^2.7.0
  flutter_contacts: ^1.1.9+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/welcome_wedding.png
    - assets/images/welcome_celebration.png
